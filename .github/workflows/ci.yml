name: ci
on:
  push: { branches: [main] }
  pull_request:
jobs:
  cpu-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install
        run: |
          pip install -e ".[refs,test]"
      - name: Fetch reference engines (parity targets)
        run: |
          mkdir -p reference-engines
          git clone --depth 1 https://github.com/sotetsuk/pgx.git reference-engines/pgx
          git clone --depth 1 https://github.com/instadeepai/jumanji.git reference-engines/jumanji
      - name: Tests (CPU — kernel tests skip by design)
        run: pytest tests/ -q
